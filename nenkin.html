<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Three.js アメーバからキノコへ</title>
    <style>
      body {
        margin: 0;
        background: #228b22;
      } /* フォレストグリーンなどお好みの緑色に */
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js";

      // シーン・カメラ・レンダラー
      const scene = new THREE.Scene();
      //scene.background = null ; // 背景を無色（透明）に
      scene.background = new THREE.Color(0x228b22); // 明るいグレーなど
      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 5, 18);
      camera.lookAt(0, 2, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // 追加: レンダリング用のdivを作成
      const renderDiv = document.createElement("div");
      renderDiv.style.width = "1024px";
      renderDiv.style.height = "568px";
      renderDiv.style.margin = "0 auto";
      renderDiv.style.position = "relative";
      document.body.appendChild(renderDiv);

      // レンダラーのサイズをdivに合わせる
      renderer.setSize(1024, 568);
      renderDiv.appendChild(renderer.domElement);

      // ライト
      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(10, 20, 10);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x8888aa, 0.7));

      // 粘菌サイクルをクラス化
      class SlimeMoldCycle {
        constructor(scene, basePos = new THREE.Vector3(), color = 0xffe066) {
          this.scene = scene;
          this.basePos = basePos.clone();
          this.color = color;

          // 状態
          this.phase = 0; // 0:ワーム, 1:キノコ化, 2:胞子, 3:胞子落下, 4:菌糸成長, 5:アメーバ出現, 6:集合
          this.phaseTime = 0;
          this.WORM_SEGMENTS = 18;
          this.wormHeadPos = this.basePos
            .clone()
            .add(new THREE.Vector3(0, 1.5, 0));
          this.wormPath = [this.wormHeadPos.clone()];
          this.wormSpheres = [];
          this.spores = [];
          this.mushroomCap = null;
          this.mushroomStem = null;
          this.myceliumLines = []; // 菌糸のライン

          // 最初の球体
          const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
          const sphereMat = new THREE.MeshStandardMaterial({
            color: this.color,
            roughness: 0.8,
            metalness: 0.1,
            transparent: true,
            opacity: 0.85,
            emissive: this.color,
            emissiveIntensity: 0.5,
          });
          this.amoeba = new THREE.Mesh(sphereGeo, sphereMat);
          this.amoeba.position.copy(this.wormHeadPos);
          scene.add(this.amoeba);

          // ワーム
          const wormGeo = new THREE.SphereGeometry(0.6, 16, 16);
          for (let i = 0; i < this.WORM_SEGMENTS; i++) {
            const mat = new THREE.MeshStandardMaterial({
              color: this.color,
              roughness: 0.8,
              metalness: 0.1,
              transparent: true,
              opacity: 0.85,
              emissive: this.color,
              emissiveIntensity: 0.5,
            });
            const mesh = new THREE.Mesh(wormGeo, mat);
            mesh.visible = false;
            scene.add(mesh);
            this.wormSpheres.push(mesh);
          }
        }

        dispose() {
          // メモリ解放
          this.scene.remove(this.amoeba);
          this.amoeba.geometry.dispose();
          this.amoeba.material.dispose();
          for (let s of this.wormSpheres) {
            this.scene.remove(s);
            s.geometry.dispose();
            s.material.dispose();
          }
          if (this.mushroomCap) {
            this.scene.remove(this.mushroomCap);
            this.mushroomCap.geometry.dispose();
            this.mushroomCap.material.dispose();
          }
          if (this.mushroomStem) {
            this.scene.remove(this.mushroomStem);
            this.mushroomStem.geometry.dispose();
            this.mushroomStem.material.dispose();
          }
          for (let sp of this.spores) {
            this.scene.remove(sp.mesh);
            sp.mesh.geometry.dispose();
            sp.mesh.material.dispose();
          }
        }

        animate(t, dt) {
          this.phaseTime += dt;

          // 各フェーズの長さを調整して合計約60秒になるように
          // 例: worm移動: 12s, 集合: 6s, アメーバ: 6s, きのこ化: 8s, 成長: 8s, 胞子: 8s, 菌糸: 6s, アメーバ再生: 6s
          // 必要に応じて下記の時間を調整してください

          if (this.phase === 0) {
            // wormがbasePos周辺を這い回る
            let gatherTime = 12.0;      // worm移動
            let morphStart = 18.0;      // 集合開始
            let morphEnd = 24.0;        // アメーバ球体として表示

            // wormの頭の進行方向（有機的な曲線、basePosでずらす）
            const r =
              3.5 +
              Math.sin(t * 0.7 + this.basePos.x) * 1.2 +
              Math.sin(t * 0.3 + this.basePos.z) * 0.7;
            this.wormHeadPos.x =
              this.basePos.x +
              Math.cos(t * 0.6 + Math.sin(t * 0.2 + this.basePos.y)) * r;
            this.wormHeadPos.z =
              this.basePos.z +
              Math.sin(t * 0.6 + Math.cos(t * 0.3 + this.basePos.x)) * r;
            this.wormHeadPos.y =
              this.basePos.y +
              1.5 +
              Math.sin(t * 1.2 + this.basePos.z) * 0.5 +
              Math.sin(t * 0.5 + this.basePos.x) * 0.2;

            // パスを更新
            this.wormPath.unshift(this.wormHeadPos.clone());
            if (this.wormPath.length > this.WORM_SEGMENTS * 3)
              this.wormPath.pop();

            // 集合アニメーション進行度
            let gather = 0;
            if (this.phaseTime > gatherTime && this.phaseTime < morphStart) {
              gather = (this.phaseTime - gatherTime) / (morphStart - gatherTime);
            } else if (this.phaseTime >= morphStart) {
              gather = 1;
            }

            // 集合先（アメーバの中心）
            const amoebaCenter = this.basePos
              .clone()
              .add(new THREE.Vector3(0, 1.5, 0));

            for (let i = 0; i < this.WORM_SEGMENTS; i++) {
              const idx = Math.min(i * 3, this.wormPath.length - 1);
              let pos = this.wormPath[idx].clone();
              // 集合アニメーション
              if (gather > 0) {
                pos.lerp(amoebaCenter, gather);
              }
              this.wormSpheres[i].position.copy(pos);

              // 集合時は徐々に球体っぽく
              let scale =
                1.1 -
                (i / this.WORM_SEGMENTS) * 0.7 +
                Math.sin(t * 2 + i) * 0.05;
              if (gather > 0) {
                scale = scale * (1 - gather) + 1.5 * gather;
              }
              this.wormSpheres[i].scale.set(scale, scale, scale);

              // 色・透明度
              const h =
                0.13 + Math.sin(t * 0.5 + i * 0.1 + this.basePos.x) * 0.03;
              this.wormSpheres[i].material.color.setHSL(h, 0.95, 0.65);
              this.wormSpheres[i].material.opacity = 0.85 * (1 - gather * 0.5);
              this.wormSpheres[i].material.emissive.set(
                this.wormSpheres[i].material.color
              );
              this.wormSpheres[i].visible = true;
            }

            // アメーバ球体の表示制御
            if (this.phaseTime < morphStart) {
              // 集合前は非表示、集合後は表示
              this.amoeba.visible = gather === 1;
              if (gather === 1) {
                this.amoeba.position.copy(amoebaCenter);
              }
            }

            // worm→きのこ変形アニメーション
            let morph = 0;
            if (this.phaseTime > morphStart)
              morph = Math.min(
                1,
                (this.phaseTime - morphStart) / (morphEnd - morphStart)
              );

            // morph進行中はwormの球体をキノコの形状に寄せていく（前回のロジックを流用）
            if (morph > 0) {
              let stemTarget = this.wormHeadPos
                .clone()
                .add(new THREE.Vector3(0, -1.2, 0));
              let capTarget = this.wormHeadPos
                .clone()
                .add(new THREE.Vector3(0, 0.7, 0));
              let capRadius = 1.7,
                stemRadius = 0.5,
                stemHeight = 3;

              for (let i = 0; i < this.WORM_SEGMENTS; i++) {
                let pos = amoebaCenter.clone();
                if (i < this.WORM_SEGMENTS * 0.5) {
                  // 茎
                  const tStem = i / (this.WORM_SEGMENTS * 0.5 - 1);
                  let stemPos = stemTarget.clone();
                  stemPos.y += (tStem - 0.5) * stemHeight;
                  pos.lerp(stemPos, morph);

                  const wormScale = 1.5;
                  const stemScale =
                    stemRadius * (0.7 + 0.6 * (1 - Math.abs(tStem - 0.5) * 2));
                  const scale = wormScale * (1 - morph) + stemScale * morph;
                  this.wormSpheres[i].scale.set(scale, scale, scale);
                  this.wormSpheres[i].material.color.lerp(
                    new THREE.Color(0xffffff),
                    morph * 0.7
                  );
                } else {
                  // 傘
                  const tCap =
                    (i - this.WORM_SEGMENTS * 0.5) /
                    (this.WORM_SEGMENTS * 0.5 - 1);
                  const theta = Math.PI * 0.15 + Math.PI * 0.7 * tCap;
                  const phi = Math.PI * 2 * tCap;
                  let capPos = capTarget.clone();
                  capPos.x += Math.cos(phi) * Math.sin(theta) * capRadius;
                  capPos.y += Math.cos(theta) * capRadius * 0.5;
                  capPos.z += Math.sin(phi) * Math.sin(theta) * capRadius;
                  pos.lerp(capPos, morph);

                  const wormScale = 1.5;
                  const capScale =
                    capRadius * 0.5 * (0.7 + 0.6 * Math.sin(theta));
                  const scale = wormScale * (1 - morph) + capScale * morph;
                  this.wormSpheres[i].scale.set(scale, scale * 0.7, scale);
                  this.wormSpheres[i].material.color.lerp(
                    new THREE.Color(0xdd2222),
                    morph * 0.7
                  );
                }
                this.wormSpheres[i].position.copy(pos);
                this.wormSpheres[i].material.opacity = 0.85 * (1 - morph * 0.7);
                this.wormSpheres[i].material.emissive.set(
                  this.wormSpheres[i].material.color
                );
              }

              // アメーバ球体を徐々に消す
              this.amoeba.visible = morph < 0.7;
              this.amoeba.material.opacity = 0.85 * (1 - morph);

              // morph進行中はキノコを同時に生成し、徐々に現れる
              if (!this.mushroomCap && !this.mushroomStem) {
                const stemGeo = new THREE.CylinderGeometry(0.5, 0.7, 3, 16);
                const stemMat = new THREE.MeshStandardMaterial({
                  color: 0xffffff,
                  roughness: 0.7,
                  transparent: true,
                  opacity: 0,
                });
                this.mushroomStem = new THREE.Mesh(stemGeo, stemMat);
                this.mushroomStem.position.copy(stemTarget);
                this.scene.add(this.mushroomStem);
                const capGeo = new THREE.SphereGeometry(
                  1.7,
                  24,
                  16,
                  0,
                  Math.PI * 2,
                  0,
                  Math.PI / 2
                );
                const capMat = new THREE.MeshStandardMaterial({
                  color: 0xdd2222,
                  roughness: 0.5,
                  transparent: true,
                  opacity: 0,
                });
                this.mushroomCap = new THREE.Mesh(capGeo, capMat);
                this.mushroomCap.position.copy(capTarget);
                this.scene.add(this.mushroomCap);
              }
              if (this.mushroomCap && this.mushroomStem) {
                const show = morph;
                this.mushroomStem.visible = true;
                this.mushroomCap.visible = true;
                this.mushroomStem.material.opacity = show;
                this.mushroomCap.material.opacity = show;
                this.mushroomStem.scale.y = show;
                this.mushroomCap.scale.set(show, show * 0.6, show);
              }
            }

            // worm→きのこ変形が終わったら次のフェーズ
            if (this.phaseTime > morphEnd) {
              this.phase = 1;
              this.phaseTime = 0;
              for (let s of this.wormSpheres) s.visible = false;
              if (this.mushroomCap && this.mushroomStem) {
                this.mushroomCap.material.opacity = 1;
                this.mushroomStem.material.opacity = 1;
                this.mushroomCap.scale.set(1, 0.6, 1);
                this.mushroomStem.scale.y = 1;
              }
              this.amoeba.visible = false;
            }
          } else if (this.phase === 1) {
            // キノコの成長
            const grow = Math.min(1, this.phaseTime / 8); // 8秒かけて成長
            this.mushroomStem.scale.y = grow;
            this.mushroomCap.scale.set(grow, grow * 0.6, grow);
            this.mushroomStem.position.y = this.wormHeadPos.y - 1.2 + (1 - grow) * 1.5;
            this.mushroomCap.position.y = this.wormHeadPos.y + 0.7 + (1 - grow) * 1.5;

            if (grow >= 1 && this.phaseTime > 8) { // 8秒後に胞子放出
              this.phase = 2;
              this.phaseTime = 0;
              this.spores = [];
              for (let i = 0; i < 18; i++) {
                const angle = (i / 18) * Math.PI * 2;
                const dir = new THREE.Vector3(
                  Math.cos(angle),
                  0.5 + Math.random() * 0.5,
                  Math.sin(angle)
                ).normalize();
                const mesh = new THREE.Mesh(
                  new THREE.SphereGeometry(0.15, 8, 8),
                  new THREE.MeshStandardMaterial({ color: 0xffffcc })
                );
                mesh.position.copy(this.mushroomCap.position);
                this.scene.add(mesh);
                this.spores.push({
                  mesh: mesh,
                  pos: this.mushroomCap.position.clone(),
                  dir: dir,
                  t: 0,
                });
              }
            }
          } else if (this.phase === 2) {
            // 胞子が飛び散る
            let allGone = true;
            for (let s of this.spores) {
              s.t += dt;
              s.pos.addScaledVector(s.dir, 0.08);
              s.pos.y -= s.t * 0.04;
              s.mesh.position.copy(s.pos);
              if (s.pos.y > 0.2) allGone = false;
            }
            // すべて地面に落ちたら次のフェーズ
            if (allGone && this.phaseTime > 8) {
              this.phase = 3;
              this.phaseTime = 0;
              for (let i = 1; i < this.spores.length; i++) {
                this.scene.remove(this.spores[i].mesh);
                this.spores[i].mesh.geometry.dispose();
                this.spores[i].mesh.material.dispose();
              }
              this.spores = [this.spores[0]];
              // 菌糸の初期化
              this.myceliumLines = [];
              const dirCount = 8;
              for (let i = 0; i < dirCount; i++) {
                const angle = (i / dirCount) * Math.PI * 2;
                this.myceliumLines.push({
                  dir: new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)),
                  len: 0,
                  mesh: null
                });
              }
            }
          } else if (this.phase === 3) {
            // 菌糸が地面に放射状に伸びる
            let grow = Math.min(1, this.phaseTime / 3.0); // 3秒かけて伸びる
            const sporePos = this.spores[0].mesh.position;

            // 地面のサイズ（PlaneGeometry(30, 30)なので半径は15）
            const groundRadius = 14.5; // 端まで行かないように少し小さめ

            for (let i = 0; i < this.myceliumLines.length; i++) {
              const line = this.myceliumLines[i];
              // 既存のmeshがなければ生成
              if (!line.mesh) {
                const geo = new THREE.CylinderGeometry(0.04, 0.04, 1, 6);
                const mat = new THREE.MeshStandardMaterial({ color: 0xffffcc });
                line.mesh = new THREE.Mesh(geo, mat);
                line.mesh.castShadow = false;
                line.mesh.receiveShadow = false;
                this.scene.add(line.mesh);
              }
              // 菌糸の最大長さを地面の端までに制限
              // 地面中心からsporePosまでの距離
              const center2spore = new THREE.Vector2(sporePos.x, sporePos.z).length();
              // 端までの残り距離
              const maxLen = Math.max(0, groundRadius - center2spore);
              line.len = grow * Math.min(2.5, maxLen); // 2.5または端まで

              // 配置
              const dir2d = new THREE.Vector2(line.dir.x, line.dir.z).normalize();
              const mid = sporePos.clone().add(new THREE.Vector3(dir2d.x, 0, dir2d.y).multiplyScalar(line.len / 2));
              line.mesh.position.copy(mid);
              line.mesh.position.y = 0.08;
              line.mesh.scale.set(1, line.len, 1);
              line.mesh.rotation.set(Math.PI / 2, 0, 0);
              line.mesh.lookAt(mid.clone().add(new THREE.Vector3(dir2d.x, 0, dir2d.y)));
              line.mesh.visible = true;
            }
            // 菌糸が伸びきったらアメーバ出現へ
            if (grow >= 1 && this.phaseTime > 3.5) {
              this.phase = 4;
              this.phaseTime = 0;
              // アメーバ生成
              if (!this.amoeba) {
                const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
                const sphereMat = new THREE.MeshStandardMaterial({
                  color: this.color,
                  roughness: 0.8,
                  metalness: 0.1,
                  transparent: true,
                  opacity: 0.85,
                  emissive: this.color,
                  emissiveIntensity: 0.5,
                });
                this.amoeba = new THREE.Mesh(sphereGeo, sphereMat);
                this.scene.add(this.amoeba);
              }
              this.amoeba.position.copy(sporePos);
              this.amoeba.scale.set(0.1, 0.1, 0.1);
              this.amoeba.visible = true;
            }
          } else if (this.phase === 4) {
            // アメーバが地面に現れ、徐々に大きくなる
            let appear = Math.min(1, this.phaseTime / 2.0);
            this.amoeba.scale.set(appear, appear, appear);
            // 菌糸を徐々に消す
            for (let line of this.myceliumLines) {
              if (line.mesh) line.mesh.visible = (appear < 0.8);
            }
            if (appear >= 1 && this.phaseTime > 2.2) {
              // アメーバが十分大きくなったら集合フェーズへ
              this.phase = 0;
              this.phaseTime = 0;
              // 菌糸を消去
              for (let line of this.myceliumLines) {
                if (line.mesh) {
                  this.scene.remove(line.mesh);
                  line.mesh.geometry.dispose();
                  line.mesh.material.dispose();
                }
              }
              this.myceliumLines = [];
              // ワーム再生
              this.wormHeadPos.copy(this.amoeba.position);
              this.wormPath = [];
              for (let i = 0; i < this.WORM_SEGMENTS * 3; i++)
                this.wormPath.push(this.wormHeadPos.clone());
              for (let s of this.wormSpheres) s.visible = true;
              // 胞子も消去
              for (let s of this.spores) {
                this.scene.remove(s.mesh);
                s.mesh.geometry.dispose();
                s.mesh.material.dispose();
              }
              this.spores = [];
            }
          }
          // ...菌糸成長やアメーバ再生のフェーズを追加する場合は同様に時間を長めに設定...
        }
      }

      // --- インスタンスを複数配置（20体、集合感を出すために狭い範囲・色も近く） ---
      const cycles = [];
      const cycleStartOffsets = [];
      const center = new THREE.Vector3(0, 0, 0);
      const radius = 3.5;
      for (let i = 0; i < 20; i++) {
        // 円周上＋ランダムで集合感
        const angle = (i / 20) * Math.PI * 2 + Math.random() * 0.2;
        const r = radius + Math.random() * 1.2 - 0.6;
        const pos = new THREE.Vector3(
          center.x + Math.cos(angle) * r,
          0,
          center.z + Math.sin(angle) * r
        );
        // 色も近い黄色系でランダム
        const baseColor = 0xffe066;
        const h = 0.13 + Math.random() * 0.04;
        const s = 0.93 + Math.random() * 0.07;
        const l = 0.6 + Math.random() * 0.08;
        const color = new THREE.Color().setHSL(h, s, l);
        cycles.push(new SlimeMoldCycle(scene, pos, color.getHex()));
        cycleStartOffsets.push(Math.random() * 6);
      }

      // --- 地面を追加（四角く、もっと広く） ---
      const groundGeo = new THREE.PlaneGeometry(40, 40);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x444444,
        roughness: 0.9,
        metalness: 0.1,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      // 地面にシェード（グラデーション）をつける
      // 1. カスタムシェーダーマテリアルでグラデーションを実現
      const groundShaderMat = new THREE.ShaderMaterial({
        uniforms: {
          color1: { value: new THREE.Color(0x444444) }, // 中央
          color2: { value: new THREE.Color(0x222222) }, // 外周
        },
        vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
        fragmentShader: `
    uniform vec3 color1;
    uniform vec3 color2;
    varying vec2 vUv;
    void main() {
      float dist = length(vUv - vec2(0.5, 0.5)) * 2.0;
      dist = clamp(dist, 0.0, 1.0);
      vec3 color = mix(color1, color2, dist);
      gl_FragColor = vec4(color, 1.0);
    }
  `,
        side: THREE.DoubleSide,
      });

      // 地面をShaderMaterialに差し替え
      ground.material = groundShaderMat;

      // グリッドヘルパーを追加（サイズ30, 分割数30, 線色は薄いグレー）
      const grid = new THREE.GridHelper(30, 30, 0x888888, 0x444444);
      grid.position.y = 0.01; // 地面と重ならないよう少し浮かせる
      scene.add(grid);

      // カメラ操作用変数
      let camTarget = camera.position.clone();
      const camStep = 0.7;

      // 矢印キーでカメラを移動
      window.addEventListener("keydown", (event) => {
        switch (event.key) {
          case "ArrowUp":
            camTarget.z -= camStep;
            break;
          case "ArrowDown":
            camTarget.z += camStep;
            break;
          case "ArrowLeft":
            camTarget.x -= camStep;
            break;
          case "ArrowRight":
            camTarget.x += camStep;
            break;
        }
      });

      // アニメーションループ内でカメラ位置を滑らかに補間
      function animate() {
        requestAnimationFrame(animate);
        camera.position.lerp(camTarget, 0.15); // 滑らかに追従
        camera.lookAt(0, 2, 0);
        const t = performance.now() * 0.001;
        for (let i = 0; i < cycles.length; i++) {
          cycles[i].animate(t - cycleStartOffsets[i], 0.016);
        }
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        // 必要ならここでdivのサイズに合わせてリサイズ処理
        renderer.setSize(1024, 568);
        camera.aspect = 1024 / 568;
        camera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
